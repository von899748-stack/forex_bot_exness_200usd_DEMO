version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: forexbot-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: forex_bot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: forexbot-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: forexbot
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - TIMESCALEDB_HOST=postgres
      - TIMESCALEDB_PORT=5432
      - TIMESCALEDB_DB=forex_bot
      - TIMESCALEDB_USER=postgres
      - TIMESCALEDB_PASSWORD=postgres
      - RABBITMQ_URL=amqp://rabbitmq:5672/
      - USE_RABBITMQ=True
      - TOTAL_CAPITAL=200
      - MAX_AGENTS=5
      - RISK_BASE=0.01
      - DYNAMIC_RISK=True
      - MAX_RISK=0.02
      - MIN_RISK=0.005
      - TRADING_START=7
      - TRADING_END=22
      - MAX_CONSECUTIVE_LOSSES=3
      - ENABLE_NOISE_FILTER=True
      - BROKER_MODE=demo
      - LOG_LEVEL=INFO
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
    command: python -m src.main --mode demo --symbols EURUSD GBPUSD XAUUSD

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: forexbot-dashboard
    depends_on:
      - bot
    ports:
      - "8501:8501"
    environment:
      - RABBITMQ_URL=amqp://rabbitmq:5672/
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    command: streamlit run src/dashboard/app.py --server.port=8501 --server.address=0.0.0.0

volumes:
  postgres_data:
  rabbitmq_data:
